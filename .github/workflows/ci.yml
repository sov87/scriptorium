name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package (runtime deps via pyproject)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

          pip install pytest lxml

      - name: Pytest
        run: |
          pytest -q
      - name: Prepare local embedding model for strict doctor
        run: |
          mkdir -p models
          python - << 'PY'
          from sentence_transformers import SentenceTransformer
          m = SentenceTransformer("sentence-transformers/all-MiniLM-L6-v2")
          m.save("models/all-MiniLM-L6-v2")
          print("saved model -> models/all-MiniLM-L6-v2")
          PY

      - name: Use public registry for CI
        run: |
          cp docs/corpora.public.json docs/corpora.json

      - name: Doctor (strict) + build + smoke
        run: |
          python -m scriptorium doctor --config configs/sample_demo_ci_strict.toml --strict --json
          python -m scriptorium db-build --config configs/sample_demo_ci_strict.toml --overwrite --strict-provenance

          # Validator smoke: quote must be real (no hallucinated quotes)
          python - << 'PY'
          import sqlite3
          from scriptorium.config import load_config
          from scriptorium.answer_db import validate_answer_obj

          cfg = load_config("configs/sample_demo_ci_strict.toml")
          db = cfg.db_path

          con = sqlite3.connect(str(db))
          try:
              row = None
              # CI sample corpora can be very small; choose the longest available segment text.
              for min_len in (200, 120, 80, 60, 40, 25):
                  row = con.execute(
                      "select id, text from segments where corpus_id=? and text is not null and length(text) >= ? order by length(text) desc limit 1",
                      ("oe_bede_sample", min_len),
                  ).fetchone()
                  if row:
                      break
          finally:
              con.close()

          if not row:
              raise SystemExit("CI validator seed failed: no segment text found for oe_bede_sample")

          sid, text = row
          text = text or ''
          passages = [{'id': sid, 'text': text}]
          allowed_ids = {sid}

          # Take a real substring from the passage and normalize whitespace; must satisfy min quote length in validator.
          good_quote = ' '.join(text[: min(200, len(text))].split())
          if len(good_quote) < 20:
              raise SystemExit("CI validator seed failed: segment text too short after normalization")

          obj_good = {'answer': 'x', 'citations': [{'id': sid, 'quote': good_quote}], 'notes': []}
          errs_good = validate_answer_obj(obj_good, allowed_ids, passages)
          if errs_good:
              raise SystemExit('CI validator assert failed: good quote rejected: ' + '; '.join(errs_good))

          bad_quote = 'THIS QUOTE DOES NOT APPEAR IN THE SOURCE TEXT AND SHOULD FAIL VALIDATION'
          obj_bad = {'answer': 'x', 'citations': [{'id': sid, 'quote': bad_quote}], 'notes': []}
          errs_bad = validate_answer_obj(obj_bad, allowed_ids, passages)
          if not errs_bad:
              raise SystemExit('CI validator assert failed: bad quote was accepted')
          print('CI validator assert ok')
          PY

          python -m scriptorium vec-build --config configs/sample_demo_ci_strict.toml --out-dir indexes/vec_faiss_global --batch 16
          python -m scriptorium db-search --config configs/sample_demo_ci_strict.toml --q "lareow" --k 3 --corpus oe_bede_sample
          python -m scriptorium retrieve --config configs/sample_demo_ci_strict.toml --q "What is said about the lareow?" --k 5 --corpus oe_bede_sample
          python -m scriptorium answer-db --config configs/sample_demo_ci_strict.toml --q "What is said about the lareow?" --k 5 --corpus oe_bede_sample --dry-run


          # Seed a minimal answer run (no LLM) and exercise import + FTS + answer-search + answer-show
          python - << 'PY'
          from pathlib import Path
          import json
          import sqlite3
          from scriptorium.config import load_config

          cfg = load_config("configs/sample_demo_ci_strict.toml")
          db = cfg.db_path
          con = sqlite3.connect(str(db))
          try:
              seg = con.execute("select id from segments where corpus_id=? limit 1", ("oe_bede_sample",)).fetchone()
          finally:
              con.close()
          if not seg:
              raise SystemExit('CI seed failed: no segments for oe_bede_sample')
          seg_id = seg[0]

          run = Path("runs/answer_db/20000101_000000_ci_seed_king")
          run.mkdir(parents=True, exist_ok=True)
          (run / "meta.json").write_text(json.dumps({"run_id": run.name, "corpus_filter": "oe_bede_sample"}, separators=(",", ":")), encoding="utf-8")
          (run / "retrieval.json").write_text(json.dumps({"query": "king", "corpus": "oe_bede_sample", "hits": [{"corpus_id": "oe_bede_sample", "segment_id": seg_id}]}, separators=(",", ":")), encoding="utf-8")
          (run / "answer.json").write_text(json.dumps({"answer": "CI seeded answer containing king.", "citations": [], "notes": []}, separators=(",", ":")), encoding="utf-8")
          (run / "validation.json").write_text("{}", encoding="utf-8")
          print(run)
          PY

          python -m scriptorium answer-import-db --config configs/sample_demo_ci_strict.toml --run-dir runs/answer_db/20000101_000000_ci_seed_king
          python -m scriptorium check-ai-fts --config configs/sample_demo_ci_strict.toml --json

          # Assert: answer-search finds cites and answer-show resolves at least 1 segment
          python - << 'PY'
          from scriptorium.config import load_config
          from scriptorium.ai_layers_db import answer_search, answer_show

          cfg = load_config("configs/sample_demo_ci_strict.toml")
          db = cfg.db_path
          hits = answer_search(db, q='king*', k=5, corpus='oe_bede_sample', show_cites=True)
          if not hits:
              raise SystemExit('CI assert failed: answer-search returned 0 hits')
          if not hits[0].get('cites'):
              raise SystemExit('CI assert failed: answer-search returned hit but no cites')
          run_id = hits[0].get('run_id','')
          res = answer_show(db, run_id=run_id, max_cites=1, chars=80)
          if not res.get('resolved'):
              raise SystemExit('CI assert failed: answer-show did not resolve any cited segment')
          print('CI assert ok')
          PY

