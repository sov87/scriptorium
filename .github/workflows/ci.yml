name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Smoke test (sample corpus)
        env:
          HF_HOME: ~/.cache/huggingface
          TRANSFORMERS_CACHE: ~/.cache/huggingface
        run: |
          python tools/smoke_test.py --config configs/sample_demo_ci.toml --compileall
