[root]
# config files live under ./configs, so ".." points to repo root
project_root = ".."

[window]
name = "YOUR_WINDOW"
tag = "LOCAL"

[ps]
release_window_ps1 = "src/release_window.ps1"

[indexes]
bm25 = "indexes/bm25/oe_bede_prod_utf8.pkl"
vec_dir = "indexes/vec_faiss"

[canon]
asc = "data_proc/asc_A_prod.jsonl"
bede = "data_proc/oe_bede_prod_utf8.jsonl"

[embeddings]
# For strict local-first, set this to a local path, not an HF id.
model = "intfloat/multilingual-e5-base"
use_e5_prefix = true

[query]
out_parent = "runs/query_hybrid"
topk = 8
bm25_k = 24
vec_k = 24

[answer]
out_parent = "runs/answer_local"
k_passages = 8

[llm]
base_url = "http://localhost:1234/v1"
model = "qwen/qwen3-30b-a3b-2507"
temperature = 0.2
max_output_tokens = 1200
timeout_seconds = 120
